<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ACEest Fitness & Gym - UI</title>
    <link rel="icon" href="/favicon.ico" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">ACEest Fitness & Gym</a>
      </div>
    </nav>

    <div class="container">
      <div class="row">
        <div class="col-md-6">
          <div class="card mb-3">
            <div class="card-header">Workouts</div>
            <div class="card-body">
              <ul id="workout-list" class="list-group mb-3"></ul>

              <h6>Add workout</h6>
              <form id="workout-form">
                <div class="mb-2">
                  <input id="w-name" class="form-control" placeholder="Name" required />
                </div>
                <div class="mb-2">
                  <input id="w-duration" type="number" class="form-control" placeholder="Duration minutes" required />
                </div>
                <button class="btn btn-sm btn-primary" type="submit">Add</button>
              </form>
            </div>
          </div>
        </div>

        <div class="col-md-6">
          <div class="card mb-3">
            <div class="card-header">Members</div>
            <div class="card-body">
              <ul id="member-list" class="list-group mb-3"></ul>

              <h6>Add member</h6>
              <form id="member-form">
                <div class="mb-2">
                  <input id="m-name" class="form-control" placeholder="Name" required />
                </div>
                <div class="mb-2">
                  <input id="m-email" type="email" class="form-control" placeholder="Email" required />
                </div>
                <button class="btn btn-sm btn-primary" type="submit">Add</button>
              </form>
            </div>
          </div>
        </div>
      </div>

      <footer class="mt-4 text-muted small">API available at <code>/workouts</code> and <code>/members</code></footer>
    </div>

    <script>
      async function loadWorkouts(){
        const res = await fetch('/workouts');
        const data = await res.json();
        const ul = document.getElementById('workout-list');
        ul.innerHTML = '';
        data.forEach(w => {
          const li = document.createElement('li');
          li.className = 'list-group-item d-flex justify-content-between align-items-center';
          li.textContent = `${w.name} — ${w.duration_minutes} min`;
          ul.appendChild(li);
        })
      }

      async function loadMembers(){
        const res = await fetch('/members');
        const data = await res.json();
        const ul = document.getElementById('member-list');
        ul.innerHTML = '';
        data.forEach(m => {
          const li = document.createElement('li');
          li.className = 'list-group-item';
          li.textContent = `${m.name} <${m.email}>`;
          ul.appendChild(li);
        })
      }

      document.getElementById('workout-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('w-name').value;
        const duration = Number(document.getElementById('w-duration').value);
        const res = await fetch('/workouts', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({name, duration_minutes: duration})
        });
        if (res.status === 201) {
          document.getElementById('w-name').value = '';
          document.getElementById('w-duration').value = '';
          loadWorkouts();
        } else {
          const err = await res.json();
          alert('Error: ' + (err.error || JSON.stringify(err)));
        }
      });

      document.getElementById('member-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('m-name').value;
        const email = document.getElementById('m-email').value;
        const res = await fetch('/members', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({name, email})
        });
        if (res.status === 201) {
          document.getElementById('m-name').value = '';
          document.getElementById('m-email').value = '';
          loadMembers();
        } else {
          const err = await res.json();
          alert('Error: ' + (err.error || JSON.stringify(err)));
        }
      });

      // initial load
      loadWorkouts();
      loadMembers();
    </script>
  </body>
</html>
